name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/dataroom
      deploy: true
      deploy-deployment: dataroom
      deploy-namespace: hanzo
    secrets: inherit
